# ==============================================
# Frontend CI Pipeline
# Runs on pull requests and pushes to main/develop
# ==============================================

name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'portfolio-ui/**'
      - 'shared/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'portfolio-ui/**'
      - 'shared/**'
      - '.github/workflows/frontend-ci.yml'

env:
  NODE_VERSION: '20.x'
  WORKING_DIRECTORY: ./portfolio-ui

jobs:
  # ==============================================
  # Job 1: Code Quality Checks
  # ==============================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm install

      - name: Run ESLint
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx tsc --noEmit

      - name: Check code formatting
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css}"

  # ==============================================
  # Job 2: Security Scanning
  # ==============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm install

      - name: Run npm audit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=portfolio-ui/package.json

  # ==============================================
  # Job 3: Build and Test
  # ==============================================
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [quality]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm install

      - name: Build application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.example.com
          VITE_API_VERSION: v1
          VITE_ENABLE_ANALYTICS: true
          VITE_ENABLE_CODE_DEMO: true

      - name: Check build output
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          ls -la dist
          du -sh dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: portfolio-ui/dist
          retention-days: 7

  # ==============================================
  # Job 4: Bundle Size Analysis
  # ==============================================
  bundle-size:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package.json'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: portfolio-ui/dist

      - name: Analyze bundle size
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "📦 Bundle Size Analysis"
          echo "======================="
          find dist -type f -name "*.js" -exec ls -lh {} \; | awk '{print $5, $9}'
          echo ""
          echo "Total bundle size:"
          du -sh dist
          
      - name: Check bundle size limit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          TOTAL_SIZE=$(du -sm dist | cut -f1)
          MAX_SIZE=10
          if [ $TOTAL_SIZE -gt $MAX_SIZE ]; then
            echo "❌ Bundle size ($TOTAL_SIZE MB) exceeds limit ($MAX_SIZE MB)"
            exit 1
          else
            echo "✅ Bundle size ($TOTAL_SIZE MB) is within limit ($MAX_SIZE MB)"
          fi

  # ==============================================
  # Job 5: Lighthouse CI (Performance)
  # ==============================================
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: portfolio-ui/dist

      - name: Install http-server
        run: npm install -g http-server

      - name: Serve built application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          http-server dist -p 8080 -c-1 &
          sleep 5

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:8080
          uploadArtifacts: true
          temporaryPublicStorage: true

  # ==============================================
  # Summary Job
  # ==============================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, security, build, bundle-size, lighthouse]
    if: success()
    
    steps:
      - name: CI Pipeline Success
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "🎉 Code is ready for deployment"
