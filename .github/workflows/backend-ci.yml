# ==============================================
# Backend CI Pipeline
# Runs on pull requests and pushes to main/develop
# ==============================================

name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'portfolio-api/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'portfolio-api/**'
      - 'shared/**'
      - '.github/workflows/backend-ci.yml'

env:
  NODE_VERSION: '20.x'
  WORKING_DIRECTORY: ./portfolio-api

jobs:
  # ==============================================
  # Job 1: Code Quality Checks
  # ==============================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run lint

      - name: Run TypeScript type check
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx tsc --noEmit

      - name: Check code formatting
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prettier --check "src/**/*.ts"

      - name: Generate Prisma Client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:generate

      - name: Validate Prisma Schema
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npx prisma validate

  # ==============================================
  # Job 2: Security Scanning
  # ==============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=portfolio-api/package.json

      - name: Check for vulnerable dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          echo "Checking for known vulnerabilities..."
          npm audit --production || echo "Vulnerabilities detected, review required"

  # ==============================================
  # Job 3: Unit Tests
  # ==============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:generate

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm test
        env:
          NODE_ENV: test

      - name: Generate coverage report
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./portfolio-api/coverage/coverage-final.json
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  # ==============================================
  # Job 4: Integration Tests with Database
  # ==============================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:generate

      - name: Run database migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:migrate:prod
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/portfolio_test

      - name: Run integration tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/portfolio_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d

      - name: Verify database health
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:verify
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/portfolio_test

  # ==============================================
  # Job 5: Build Verification
  # ==============================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality, security, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:generate

      - name: Build application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run build

      - name: Check build output
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: index.js not found"
            exit 1
          fi
          echo "Build successful!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ github.sha }}
          path: ${{ env.WORKING_DIRECTORY }}/dist
          retention-days: 7

  # ==============================================
  # Job 6: API Contract Validation
  # ==============================================
  api-contract:
    name: API Contract Validation
    runs-on: ubuntu-latest
    needs: [build]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build-${{ github.sha }}
          path: ${{ env.WORKING_DIRECTORY }}/dist

      - name: Generate Prisma Client
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:generate

      - name: Run database migrations
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm run db:migrate:prod
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/portfolio_test

      - name: Start API server
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm start &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          sleep 10
        env:
          NODE_ENV: production
          PORT: 3000
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/portfolio_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-key-for-ci
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          DEMO_MODE: true

      - name: Health check
        run: |
          curl -f http://localhost:3000/api/v1/health || exit 1
          curl -f http://localhost:3000/api/v1/health/detailed || exit 1

      - name: Validate OpenAPI schema
        run: |
          curl -f http://localhost:3000/api/v1/documentation/json > openapi.json
          echo "OpenAPI schema generated successfully"

      - name: Stop API server
        if: always()
        run: |
          if [ -n "$API_PID" ]; then
            kill $API_PID || true
          fi

  # ==============================================
  # Job 7: Summary & Status
  # ==============================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, security, test, integration, build, api-contract]
    if: always()
    
    steps:
      - name: Check job results
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Verification | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Contract | ${{ needs.api-contract.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any job failed
        if: |
          needs.quality.result == 'failure' ||
          needs.security.result == 'failure' ||
          needs.test.result == 'failure' ||
          needs.integration.result == 'failure' ||
          needs.build.result == 'failure' ||
          needs.api-contract.result == 'failure'
        run: exit 1
