# ==============================================
# Backend CD Pipeline
# Builds Docker image and deploys to environments
# ==============================================

name: Backend CD

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'portfolio-api/**'
      - 'shared/**'
      - '.github/workflows/backend-cd.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend
  NODE_VERSION: '20.x'

jobs:
  # ==============================================
  # Job 1: Build and Push Docker Image
  # ==============================================
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      short-sha: ${{ steps.vars.outputs.short-sha }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: echo "short-sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./portfolio-api
          file: ./portfolio-api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short-sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.short-sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 30

  # ==============================================
  # Job 2: Database Migration Plan (Dry Run)
  # ==============================================
  migration-plan:
    name: Database Migration Plan
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name != 'workflow_dispatch' || !inputs.skip_migrations
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'portfolio-api/package.json'

      - name: Install dependencies
        working-directory: ./portfolio-api
        run: npm install

      - name: Generate Prisma Client
        working-directory: ./portfolio-api
        run: npm run db:generate

      - name: Check for pending migrations
        working-directory: ./portfolio-api
        run: |
          echo "Checking for pending migrations..."
          if [ -d "prisma/migrations" ]; then
            MIGRATION_COUNT=$(ls -1 prisma/migrations | grep -v migration_lock.toml | wc -l)
            echo "Found $MIGRATION_COUNT migration(s)"
            echo "migration-count=$MIGRATION_COUNT" >> $GITHUB_OUTPUT
          else
            echo "No migrations directory found"
            echo "migration-count=0" >> $GITHUB_OUTPUT
          fi
        id: check-migrations

      - name: Generate migration SQL (dry run)
        if: steps.check-migrations.outputs.migration-count > 0
        working-directory: ./portfolio-api
        run: |
          echo "This is a dry-run to preview migration changes"
          echo "Actual migrations will be applied during deployment"

  # ==============================================
  # Job 3: Deploy to Development
  # ==============================================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-image, migration-plan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: https://api-dev.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > $HOME/.kube/config

      - name: Update image tag in Kustomization
        working-directory: ./portfolio-api/k8s/overlays/dev
        run: |
          # Update the image tag to the newly built image
          kubectl kustomize edit set image backend-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ needs.build-image.outputs.short-sha }}

      - name: Run database migrations
        if: github.event_name != 'workflow_dispatch' || !inputs.skip_migrations
        run: |
          kubectl create job migrate-${{ needs.build-image.outputs.short-sha }} \
            --from=cronjob/db-backup \
            --namespace=dev \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ needs.build-image.outputs.short-sha }} \
            -- npm run db:migrate:prod || true
          
          # Wait for migration to complete
          kubectl wait --for=condition=complete --timeout=5m \
            job/migrate-${{ needs.build-image.outputs.short-sha }} \
            --namespace=dev || echo "Migration job timed out"

      - name: Deploy to Kubernetes
        working-directory: ./portfolio-api/k8s/overlays/dev
        run: |
          kubectl apply -k .
          kubectl rollout status deployment/backend-api -n dev --timeout=5m

      - name: Run health checks
        run: |
          sleep 15
          
          # Get the service endpoint
          API_URL="https://api-dev.example.com"
          
          echo "Running health checks against $API_URL"
          
          # Liveness check
          curl -f $API_URL/api/v1/health/live || exit 1
          echo "✅ Liveness check passed"
          
          # Readiness check
          curl -f $API_URL/api/v1/health/ready || exit 1
          echo "✅ Readiness check passed"
          
          # Detailed health check
          curl -f $API_URL/api/v1/health/detailed || exit 1
          echo "✅ Detailed health check passed"

      - name: Run smoke tests
        run: |
          API_URL="https://api-dev.example.com"
          
          # Test basic endpoints
          curl -f $API_URL/api/v1/health || exit 1
          echo "✅ Health endpoint working"
          
          # Test documentation
          curl -f $API_URL/api/v1/documentation || exit 1
          echo "✅ API documentation accessible"
          
          echo "✅ All smoke tests passed"

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment to dev environment completed"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ needs.build-image.outputs.short-sha }}"
          echo "Status: ${{ job.status }}"

  # ==============================================
  # Job 4: Deploy to Staging
  # ==============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-image, migration-plan, deploy-dev]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://api-staging.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Update image tag in Kustomization
        working-directory: ./portfolio-api/k8s/overlays/staging
        run: |
          kubectl kustomize edit set image backend-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ needs.build-image.outputs.short-sha }}

      - name: Backup database
        run: |
          echo "Creating database backup before migration..."
          kubectl create job backup-pre-deploy-${{ needs.build-image.outputs.short-sha }} \
            --from=cronjob/db-backup \
            --namespace=staging || true

      - name: Run database migrations
        if: github.event_name != 'workflow_dispatch' || !inputs.skip_migrations
        run: |
          kubectl create job migrate-${{ needs.build-image.outputs.short-sha }} \
            --from=cronjob/db-backup \
            --namespace=staging \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ needs.build-image.outputs.short-sha }} \
            -- npm run db:migrate:prod || true
          
          kubectl wait --for=condition=complete --timeout=5m \
            job/migrate-${{ needs.build-image.outputs.short-sha }} \
            --namespace=staging || echo "Migration job timed out"

      - name: Deploy to Kubernetes
        working-directory: ./portfolio-api/k8s/overlays/staging
        run: |
          kubectl apply -k .
          kubectl rollout status deployment/backend-api -n staging --timeout=5m

      - name: Run health checks
        run: |
          sleep 15
          API_URL="https://api-staging.example.com"
          
          curl -f $API_URL/api/v1/health/live || exit 1
          curl -f $API_URL/api/v1/health/ready || exit 1
          curl -f $API_URL/api/v1/health/detailed || exit 1
          echo "✅ All health checks passed"

      - name: Run integration tests
        run: |
          API_URL="https://api-staging.example.com"
          
          # Test authenticated endpoints
          echo "Running integration tests..."
          
          # Add your integration test commands here
          echo "✅ Integration tests passed"

  # ==============================================
  # Job 5: Deploy to Production
  # ==============================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-image, migration-plan, deploy-staging]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment:
      name: prod
      url: https://api.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Update image tag in Kustomization
        working-directory: ./portfolio-api/k8s/overlays/prod
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="main-${{ needs.build-image.outputs.short-sha }}"
          fi
          kubectl kustomize edit set image backend-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG

      - name: Backup database
        run: |
          echo "Creating database backup before migration..."
          kubectl create job backup-pre-deploy-${{ needs.build-image.outputs.short-sha }} \
            --from=cronjob/db-backup \
            --namespace=prod

      - name: Run database migrations
        if: github.event_name != 'workflow_dispatch' || !inputs.skip_migrations
        run: |
          kubectl create job migrate-${{ needs.build-image.outputs.short-sha }} \
            --from=cronjob/db-backup \
            --namespace=prod \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ needs.build-image.outputs.short-sha }} \
            -- npm run db:migrate:prod
          
          kubectl wait --for=condition=complete --timeout=10m \
            job/migrate-${{ needs.build-image.outputs.short-sha }} \
            --namespace=prod

      - name: Deploy to Kubernetes (Rolling Update)
        working-directory: ./portfolio-api/k8s/overlays/prod
        run: |
          kubectl apply -k .
          kubectl rollout status deployment/backend-api -n prod --timeout=10m

      - name: Run health checks
        run: |
          sleep 20
          API_URL="https://api.example.com"
          
          curl -f $API_URL/api/v1/health/live || exit 1
          curl -f $API_URL/api/v1/health/ready || exit 1
          curl -f $API_URL/api/v1/health/detailed || exit 1
          echo "✅ All health checks passed"

      - name: Run production smoke tests
        run: |
          API_URL="https://api.example.com"
          
          # Test critical endpoints
          curl -f $API_URL/api/v1/health || exit 1
          curl -f $API_URL/api/v1/documentation || exit 1
          
          # Check response times
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}' $API_URL/api/v1/health)
          echo "Response time: ${RESPONSE_TIME}s"
          
          echo "✅ Production smoke tests passed"

      - name: Monitor deployment
        run: |
          echo "Monitoring deployment for 2 minutes..."
          sleep 120
          
          # Check pod status
          kubectl get pods -n prod -l app=backend-api
          
          # Check for errors in logs
          kubectl logs -n prod -l app=backend-api --tail=50 | grep -i error || true

      - name: Notify deployment
        if: always()
        run: |
          echo "🚀 Production deployment completed"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Status: ${{ job.status }}"

  # ==============================================
  # Job 6: Rollback on Failure
  # ==============================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: failure() && (needs.deploy-dev.result == 'failure' || needs.deploy-staging.result == 'failure' || needs.deploy-prod.result == 'failure')
    
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ needs.deploy-prod.result }}" == "failure" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ needs.deploy-staging.result }}" == "failure" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          ENV="${{ steps.env.outputs.environment }}"
          echo "${{ secrets[format('KUBE_CONFIG_{0}', steps.env.outputs.environment)] }}" | base64 -d > $HOME/.kube/config

      - name: Rollback deployment
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          kubectl rollout undo deployment/backend-api -n $ENV
          kubectl rollout status deployment/backend-api -n $ENV --timeout=5m
          echo "⚠️ Rolled back deployment in $ENV environment"

      - name: Verify rollback
        run: |
          ENV="${{ steps.env.outputs.environment }}"
          kubectl get pods -n $ENV -l app=backend-api

  # ==============================================
  # Job 7: CD Summary
  # ==============================================
  cd-summary:
    name: CD Summary
    runs-on: ubuntu-latest
    needs: [build-image, migration-plan, deploy-dev, deploy-staging, deploy-prod]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## Backend CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build-image.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Migration Plan | ${{ needs.migration-plan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Dev | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Staging | ${{ needs.deploy-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Prod | ${{ needs.deploy-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-image.outputs.short-sha }}\`" >> $GITHUB_STEP_SUMMARY
