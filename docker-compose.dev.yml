# ==============================================
# Docker Compose — Local Development Testing
# Runs the full stack: PostgreSQL, Redis, API, UI
# Usage: docker compose -f docker-compose.dev.yml up -d
# ==============================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: portfolio-dev-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: portfolio-dev-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backend API
  backend:
    build:
      context: .
      dockerfile: portfolio-api/Dockerfile
    container_name: portfolio-dev-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/portfolio_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-not-for-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:8080
      LOG_LEVEL: debug
      DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  # Frontend UI
  frontend:
    build:
      context: ./portfolio-ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_API_VERSION: v1
        VITE_USE_API: "true"
        VITE_ENABLE_MSW: "false"
        VITE_APP_NAME: Portfolio
    container_name: portfolio-dev-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  default:
    name: portfolio-dev-network
