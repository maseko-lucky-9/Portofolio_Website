# ==============================================
# ArgoCD Application - Backend Database (Prod)
# PostgreSQL and Redis for production
# ==============================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-database-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: default

  source:
    repoURL: https://github.com/maseko-lucky-9/Portofolio_Website.git
    targetRevision: main
    path: portfolio-api/k8s/base
    directory:
      recurse: true
      include: '{database/*,redis/*}'

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
