# ==============================================
# ArgoCD Application - Backend Database (Dev)
# PostgreSQL and Redis for development
# ==============================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-database-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  
  source:
    repoURL: https://github.com/maseko-lucky-9/Portofolio_Website.git
    targetRevision: develop
    path: portfolio-api/k8s/base
    directory:
      recurse: true
      include: '{database/*,redis/*}'
  
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

