# ==============================================
# ArgoCD Application - Backend Production
# ==============================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: "production-deployments"
    notifications.argoproj.io/subscribe.on-sync-failed.slack: "production-alerts"
    notifications.argoproj.io/subscribe.on-health-degraded.slack: "production-alerts"
spec:
  project: default
  
  source:
    repoURL: https://github.com/maseko-lucky-9/Portofolio_Website.git
    targetRevision: main
    path: portfolio-api/k8s/overlays/prod
  
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  
  syncPolicy:
    # Manual sync for production
    automated:
      prune: false
      selfHeal: false
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
  
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
  - group: autoscaling
    kind: HorizontalPodAutoscaler
    jsonPointers:
    - /spec/minReplicas
    - /spec/maxReplicas
  
  # Health assessment
  health:
    readinessGates:
    - conditionType: "Ready"
