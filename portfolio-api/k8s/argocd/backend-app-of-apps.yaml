# ==============================================
# ArgoCD Application of Applications - Backend
# Manages all backend environment applications
# ==============================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-app-of-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  
  source:
    repoURL: https://github.com/maseko-lucky-9/Portofolio_Website.git
    targetRevision: HEAD
    path: portfolio-api/k8s/argocd
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
