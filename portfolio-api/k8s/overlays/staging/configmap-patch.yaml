# ==============================================
# ConfigMap Patch - Staging
# Staging-specific configuration
# ==============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  # Staging settings
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  DEMO_MODE: "false"
  
  # Standard rate limits
  RATE_LIMIT_MAX_ANONYMOUS: "100"
  RATE_LIMIT_MAX_AUTHENTICATED: "1000"
  
  # CORS - specific origins
  CORS_ORIGIN: "https://staging.example.com,https://admin-staging.example.com"
  
  # Features
  ENABLE_CODE_EXECUTION: "true"
  ENABLE_WEBSOCKETS: "true"
