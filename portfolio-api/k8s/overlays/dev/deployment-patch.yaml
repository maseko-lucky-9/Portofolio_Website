# ==============================================
# Deployment Patch - Development
# Resource adjustments for dev environment
# ==============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: backend-api
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: DEMO_MODE
          value: "true"
