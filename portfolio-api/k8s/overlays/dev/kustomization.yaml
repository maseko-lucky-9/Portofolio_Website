# ==============================================
# Kustomization - Backend API Development
# Development environment specific configuration
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

namePrefix: dev-

commonLabels:
  environment: dev
  app.kubernetes.io/instance: dev

bases:
- ../../base

patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress-patch.yaml

images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/backend
  newTag: develop

replicas:
- name: backend-api
  count: 1
