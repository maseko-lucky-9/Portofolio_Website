# ==============================================
# Ingress Patch - Development
# Development domain configuration
# ==============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-api
  annotations:
    # Relaxed rate limiting for dev
    nginx.ingress.kubernetes.io/limit-rps: "1000"
    nginx.ingress.kubernetes.io/limit-connections: "500"
spec:
  tls:
  - hosts:
    - api-dev.example.com
    secretName: backend-api-dev-tls
  rules:
  - host: api-dev.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-api
            port:
              number: 3000
