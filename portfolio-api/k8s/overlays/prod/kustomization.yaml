# ==============================================
# Kustomization - Backend API Production
# Production environment specific configuration
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

namePrefix: prod-

commonLabels:
  environment: prod
  app.kubernetes.io/instance: prod

bases:
- ../../base

patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress-patch.yaml
- hpa-patch.yaml

images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/backend
  newTag: latest

replicas:
- name: backend-api
  count: 1  # Single-node homelab — scale up when moving to multi-node
