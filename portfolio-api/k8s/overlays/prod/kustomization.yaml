# ==============================================
# Kustomization - Backend API Production
# Production environment specific configuration
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

namePrefix: prod-

labels:
- pairs:
    environment: prod
    app.kubernetes.io/instance: prod
  includeSelectors: false
  includeTemplates: true

bases:
- ../../base

resources:
- external-secret.yaml

patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress-patch.yaml
- hpa-patch.yaml

images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/backend
  newName: localhost:32000/portfolio-backend
  newTag: latest

replicas:
- name: backend-api
  count: 1  # Single-node homelab — scale up when moving to multi-node
