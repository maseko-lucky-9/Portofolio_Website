# ==============================================
# ExternalSecret - Backend API Secrets
# Syncs backend application secrets from Vault
# NOTE: namePrefix 'prod-' from kustomization will
# prefix both this resource and the target secret name
# ==============================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secrets
  labels:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: portfolio
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: backend-secrets
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: database-url
      remoteRef:
        key: portfolio/live
        property: database-url

    - secretKey: redis-url
      remoteRef:
        key: portfolio/live
        property: redis-url

    - secretKey: jwt-secret
      remoteRef:
        key: portfolio/live
        property: jwt-secret

    - secretKey: jwt-access-expiry
      remoteRef:
        key: portfolio/live
        property: jwt-access-expiry

    - secretKey: jwt-refresh-expiry
      remoteRef:
        key: portfolio/live
        property: jwt-refresh-expiry
