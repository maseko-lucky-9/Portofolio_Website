# ==============================================
# Ingress Patch - Production (Homelab)
# Tailscale-only, no TLS needed
# ==============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-api
  annotations:
    # Rate limiting for production
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "25"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  # No TLS — homelab is Tailscale-only (zero public exposure)
  tls: []
  rules:
  - host: api.portfolio.homelab
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-api
            port:
              number: 3000
