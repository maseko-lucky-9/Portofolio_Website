# ==============================================
# SecretStore - Vault Backend
# Connects External Secrets Operator to the
# in-cluster HashiCorp Vault instance
# ==============================================

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/name: vault-backend
    app.kubernetes.io/component: vault-integration
    app.kubernetes.io/part-of: portfolio
spec:
  provider:
    vault:
      # Matches n8n SecretStore pattern — Vault internal service address
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "portfolio-live"
          serviceAccountRef:
            name: "portfolio-external-secrets"
