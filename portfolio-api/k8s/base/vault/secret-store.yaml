# ==============================================
# SecretStore - Vault Backend
# Connects External Secrets Operator to the
# in-cluster HashiCorp Vault instance
# ==============================================

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/name: vault-backend
    app.kubernetes.io/component: vault-integration
    app.kubernetes.io/part-of: portfolio
spec:
  provider:
    vault:
      # Vault internal service address (TLS enabled, self-signed cert)
      server: "https://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      # Provide CA cert from vault-tls secret for TLS verification
      caProvider:
        type: "Secret"
        name: "vault-tls-ca"
        key: "ca.crt"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "portfolio-live"
          serviceAccountRef:
            name: "portfolio-external-secrets"
