# ==============================================
# ServiceAccount - External Secrets Operator
# Used by ESO to authenticate with Vault via
# Kubernetes auth method
# ==============================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: portfolio-external-secrets
  labels:
    app.kubernetes.io/name: portfolio-external-secrets
    app.kubernetes.io/component: vault-integration
    app.kubernetes.io/part-of: portfolio
automountServiceAccountToken: true
