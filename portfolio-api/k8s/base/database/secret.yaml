# ==============================================
# PostgreSQL Secret (Template)
# Database credentials
# NOTE: Replace with actual secrets in production
# ==============================================

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  labels:
    app: postgres
    component: database
    tier: data
type: Opaque
stringData:
  username: "portfolio_user"
  password: "change-this-password-in-production"
  postgres-password: "change-this-root-password-in-production"

---
# ==============================================
# Creating Production Secrets
# ==============================================
# 
# Generate secure passwords:
# openssl rand -base64 32
#
# Create secret:
# kubectl create secret generic postgres-secrets \
#   --from-literal=username='portfolio_user' \
#   --from-literal=password='<generated-password>' \
#   --from-literal=postgres-password='<generated-root-password>' \
#   --namespace=<environment>
#
# ==============================================
