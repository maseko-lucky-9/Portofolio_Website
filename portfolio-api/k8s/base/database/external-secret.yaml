# ==============================================
# ExternalSecret - PostgreSQL Credentials
# Syncs database credentials from Vault to K8s Secret
# ==============================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secrets
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: portfolio
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: postgres-secrets
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: username
      remoteRef:
        key: portfolio/live
        property: postgres-username

    - secretKey: password
      remoteRef:
        key: portfolio/live
        property: postgres-password

    - secretKey: postgres-password
      remoteRef:
        key: portfolio/live
        property: postgres-root-password
