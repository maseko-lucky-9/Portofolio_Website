# ==============================================
# Ingress - Backend API
# HTTP routing for external access
# ==============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-api
  labels:
    app: backend-api
    component: api
    tier: backend
  annotations:
    # SSL/TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"
    
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # CORS (handled by application)
    nginx.ingress.kubernetes.io/enable-cors: "false"
    
    # Request size
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    
    # WebSocket support
    nginx.ingress.kubernetes.io/websocket-services: "backend-api"
    
    # Security headers are set globally via the nginx configmap custom-headers
spec:
  ingressClassName: public
  tls:
  - hosts:
    - api.example.com
    secretName: backend-api-tls
  
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-api
            port:
              number: 3000
