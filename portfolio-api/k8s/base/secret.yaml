# ==============================================
# Secret - Backend API (Template)
# Sensitive application configuration
# NOTE: This is a template. Real secrets should be 
# created using kubectl or sealed-secrets/external-secrets
# ==============================================

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app: backend-api
    component: api
    tier: backend
type: Opaque
stringData:
  # Database connection
  database-url: "postgresql://portfolio_user:change-this-password-in-production@postgres:5432/portfolio"
  
  # Redis connection
  redis-url: "redis://redis:6379"
  
  # JWT secrets
  jwt-secret: "your-super-secret-jwt-key-change-this-in-production"
  jwt-access-expiry: "15m"
  jwt-refresh-expiry: "7d"
  
  # OAuth providers (optional)
  github-client-id: ""
  github-client-secret: ""
  google-client-id: ""
  google-client-secret: ""
  
  # SMTP credentials (optional)
  smtp-user: ""
  smtp-pass: ""
  
  # API keys (optional)
  sentry-dsn: ""
  ipinfo-token: ""

---
# ==============================================
# IMPORTANT: Creating Real Secrets
# ==============================================
# 
# Option 1: Using kubectl
# kubectl create secret generic backend-secrets \
#   --from-literal=database-url='postgresql://...' \
#   --from-literal=redis-url='redis://...' \
#   --from-literal=jwt-secret='...' \
#   --namespace=<environment>
#
# Option 2: Using sealed-secrets
# kubectl create secret generic backend-secrets \
#   --from-literal=database-url='postgresql://...' \
#   --dry-run=client -o yaml | \
#   kubeseal -o yaml > sealed-secret.yaml
#
# Option 3: Using external-secrets-operator
# Create ExternalSecret resource pointing to:
# - AWS Secrets Manager
# - HashiCorp Vault
# - Google Secret Manager
# - Azure Key Vault
# 
# ==============================================
