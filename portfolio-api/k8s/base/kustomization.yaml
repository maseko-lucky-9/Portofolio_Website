# ==============================================
# Kustomization - Backend API Base
# Base Kubernetes resources for all environments
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

labels:
- pairs:
    app.kubernetes.io/name: backend-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: portfolio
  includeSelectors: false
  includeTemplates: true

resources:
- deployment.yaml
- service.yaml
- configmap.yaml
# secret.yaml removed — secrets managed by ExternalSecrets (Vault)
# Template kept in repo as documentation reference
- serviceaccount.yaml
- hpa.yaml
- pdb.yaml
- networkpolicy.yaml
- ingress.yaml

images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/backend
  newTag: latest
