# ==============================================
# Redis Secret (Template)
# Redis authentication
# NOTE: Replace with actual secrets in production
# ==============================================

apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  labels:
    app: redis
    component: cache
    tier: data
type: Opaque
stringData:
  password: "change-this-redis-password-in-production"

---
# ==============================================
# Creating Production Secrets
# ==============================================
# 
# Generate secure password:
# openssl rand -base64 32
#
# Create secret:
# kubectl create secret generic redis-secrets \
#   --from-literal=password='<generated-password>' \
#   --namespace=<environment>
#
# ==============================================
