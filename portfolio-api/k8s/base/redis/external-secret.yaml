# ==============================================
# ExternalSecret - Redis Credentials
# Syncs Redis password from Vault to K8s Secret
# ==============================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-secrets
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: portfolio
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: redis-secrets
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: password
      remoteRef:
        key: portfolio/live
        property: redis-password
