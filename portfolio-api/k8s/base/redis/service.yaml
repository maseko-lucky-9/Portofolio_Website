# ==============================================
# Redis Service
# ClusterIP service for internal connections
# ==============================================

apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
    component: cache
    tier: data
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
  sessionAffinity: None
