# ==============================================
# ConfigMap - Backend API
# Non-sensitive application configuration
# ==============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend-api
    component: api
    tier: backend
data:
  # Application settings
  PORT: "3000"
  HOST: "0.0.0.0"
  
  # API Configuration
  API_VERSION: "v1"
  APP_NAME: "Portfolio API"
  
  # Database settings (non-sensitive)
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  DB_CONNECTION_TIMEOUT: "30000"
  
  # Redis settings (non-sensitive)
  REDIS_MAX_RETRIES: "3"
  REDIS_RETRY_DELAY: "1000"
  
  # CORS settings
  CORS_ORIGIN: "*"
  CORS_CREDENTIALS: "true"
  
  # Rate limiting
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX_ANONYMOUS: "100"
  RATE_LIMIT_MAX_AUTHENTICATED: "1000"
  
  # Features
  ENABLE_WEBSOCKETS: "true"
  ENABLE_CODE_EXECUTION: "false"
  DEMO_MODE: "false"
  
  # Logging
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  
  # Monitoring
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"
  
  # Email settings (non-sensitive)
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  EMAIL_FROM: "noreply@example.com"
  
  # Security
  PASSWORD_MIN_LENGTH: "8"
  PASSWORD_REQUIRE_UPPERCASE: "true"
  PASSWORD_REQUIRE_NUMBER: "true"
  PASSWORD_REQUIRE_SPECIAL: "true"
  
  # Session
  SESSION_MAX_AGE: "604800000"
  SESSION_COOKIE_NAME: "portfolio_session"
