# Ingress — MicroK8s nginx, Tailscale-only (zero public exposure)
# TLS omitted: Tailscale WireGuard provides transport encryption
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-ingress
    app.kubernetes.io/part-of: portfolio
  annotations:
    kubernetes.io/ingress.class: public
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
spec:
  rules:
    - host: portfolio.homelab
      http:
        paths:
          # API — Fastify serves under /api, no rewrite needed
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 3000
          # UI catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui-service
                port:
                  number: 8080
