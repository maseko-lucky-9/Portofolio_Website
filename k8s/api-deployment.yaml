# Portfolio API — Fastify, 2 replicas
# Replace OWNER with actual GitHub org/user
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-api
    app.kubernetes.io/part-of: portfolio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: portfolio-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-api
    app.kubernetes.io/part-of: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-api
        app.kubernetes.io/part-of: portfolio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: portfolio-api
          image: ghcr.io/OWNER/portfolio-website/api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: LOG_LEVEL
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: PORT
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: CORS_ORIGIN
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: REDIS_PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: JWT_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: JWT_REFRESH_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: portfolio-secrets
                  key: REDIS_URL
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
