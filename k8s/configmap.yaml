# Non-sensitive runtime configuration for the portfolio API
apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-config
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-config
    app.kubernetes.io/part-of: portfolio
data:
  NODE_ENV: production
  LOG_LEVEL: info
  CORS_ORIGIN: http://portfolio.homelab
  PORT: "3000"
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"
