# Portfolio UI — nginx SPA, 2 replicas
# Replace OWNER with actual GitHub org/user
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-ui
    app.kubernetes.io/part-of: portfolio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: portfolio-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-ui
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-ui
    app.kubernetes.io/part-of: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: portfolio-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portfolio-ui
        app.kubernetes.io/part-of: portfolio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: portfolio-ui
          image: ghcr.io/OWNER/portfolio-website/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 128Mi
              cpu: 100m
