# ArgoCD Application — GitOps pull-based CD
# Prerequisites:
#   1. ArgoCD installed (argocd namespace)
#   2. Sealed Secrets controller installed
#   3. MicroK8s ingress addon: microk8s enable ingress
#   4. Repo access configured in ArgoCD
#
# Bootstrap: kubectl apply -f k8s/argocd/application.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
  labels:
    app.kubernetes.io/name: portfolio
    app.kubernetes.io/part-of: portfolio
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Replace OWNER with actual GitHub org/user
    repoURL: https://github.com/OWNER/portfolio-website.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
