# IMPORTANT: Do NOT apply this file directly.
# Seal with kubeseal before applying:
#   kubeseal --format yaml < k8s/secrets.yaml > k8s/sealed-secrets.yaml
#   kubectl apply -f k8s/sealed-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secrets
  namespace: portfolio
  labels:
    app.kubernetes.io/name: portfolio-secrets
    app.kubernetes.io/part-of: portfolio
type: Opaque
stringData:
  # postgresql://portfolio:<PASSWORD>@postgres-service:5432/portfolio
  DATABASE_URL: <SEALED_SECRET>
  POSTGRES_PASSWORD: <SEALED_SECRET>
  # Generate: openssl rand -base64 48
  JWT_SECRET: <SEALED_SECRET>
  JWT_REFRESH_SECRET: <SEALED_SECRET>
  # redis://redis-service:6379
  REDIS_URL: <SEALED_SECRET>
