# ==============================================
# Docker Compose for Local Frontend Development
# ==============================================

version: '3.8'

services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
        VITE_API_VERSION: v1
        VITE_ENABLE_ANALYTICS: "false"
        VITE_ENABLE_CODE_DEMO: "true"
        VITE_APP_NAME: Portfolio
    container_name: portfolio-frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  portfolio-network:
    name: portfolio-network
    external: true
