# ==============================================
# Production Ingress — Homelab (Tailscale-only)
# ==============================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: public
  # No TLS — homelab is Tailscale-only (zero public exposure)
  rules:
  - host: portfolio.homelab
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
