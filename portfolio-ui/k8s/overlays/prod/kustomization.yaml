# ==============================================
# Production Environment Overlay
# Customizations for production environment
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod

bases:
- ../../base

nameSuffix: -prod

commonLabels:
  environment: prod

patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress.yaml

images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/frontend
  newName: localhost:32000/portfolio-frontend
  newTag: latest

replicas:
- name: frontend
  count: 1  # Single-node homelab — scale up when moving to multi-node

# Production resource adjustments
patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: frontend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "256Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "200m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "512Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "500m"

# HPA adjustments for production
- target:
    group: autoscaling
    version: v2
    kind: HorizontalPodAutoscaler
    name: frontend
  patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
