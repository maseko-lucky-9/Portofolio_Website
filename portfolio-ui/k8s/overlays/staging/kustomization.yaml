# ==============================================
# Staging Environment Overlay
# Customizations for staging environment
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

bases:
- ../../base

nameSuffix: -staging

commonLabels:
  environment: staging

patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress.yaml

images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/frontend
  newTag: main

replicas:
- name: frontend
  count: 2
