# ==============================================
# Development Environment Overlay
# Customizations for dev environment
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

bases:
- ../../base

nameSuffix: -dev

commonLabels:
  environment: dev

# Patch for development-specific configurations
patchesStrategicMerge:
- deployment-patch.yaml
- configmap-patch.yaml
- ingress.yaml

# Image tag override
images:
- name: ghcr.io/maseko-lucky-9/portofolio_website/frontend
  newTag: develop

# Replica count for dev
replicas:
- name: frontend
  count: 1

# Resource adjustments for dev (minimal)
patchesJson6902:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: frontend
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/memory
      value: "64Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/requests/cpu
      value: "50m"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: "128Mi"
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: "100m"
