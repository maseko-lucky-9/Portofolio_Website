# ==============================================
# ArgoCD Application - Frontend Production
# Manual sync required for production
# ==============================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/maseko-lucky-9/Portofolio_Website
    targetRevision: main
    path: portfolio-ui/k8s/overlays/prod
  
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  
  syncPolicy:
    # Manual sync for production (no automated)
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
  
  revisionHistoryLimit: 10
