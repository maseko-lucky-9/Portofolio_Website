# ==============================================
# ArgoCD App of Apps
# Manages all frontend applications
# ==============================================

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/maseko-lucky-9/Portofolio_Website
    targetRevision: HEAD
    path: portfolio-ui/k8s/argocd
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
