# ==============================================
# Kustomization - Base Configuration
# Groups all base Kubernetes resources
# ==============================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: default

commonLabels:
  app.kubernetes.io/name: frontend
  app.kubernetes.io/component: ui
  app.kubernetes.io/part-of: portfolio

resources:
- serviceaccount.yaml
- configmap.yaml
- deployment.yaml
- service.yaml
- hpa.yaml
- pdb.yaml
- networkpolicy.yaml

# Common annotations
commonAnnotations:
  managed-by: kustomize
